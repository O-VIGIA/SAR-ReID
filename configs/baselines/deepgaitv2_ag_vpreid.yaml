data_cfg:
  dataset_name: AG-VPReID
  dataset_root: ./data/AG-VPReID_OpenGait_PKL_192_96
  dataset_partition: ./datasets/AG-VPReID/AG_VPReID.json
  num_workers: 4
  data_in_use: [true]
  remove_no_gallery: false # Remove probe if no gallery for it
  test_dataset_name: AG-VPReID

evaluator_cfg:
  enable_float16: true
  restore_ckpt_strict: true
  restore_hint: 50000
  save_name: DeepGaitV2
  eval_func: evaluate_UAV_Ground
  aerial_platforms: [C4, C5]
  ground_platforms: [C0, C1, C2, C3]
  sampler:
    type: InferenceSampler
    batch_shuffle: false
    batch_size: 1
    frames_num_fixed: 10 # fixed frames number for training
    frames_skip_num: 0
    #sample_type: fixed_ordered
    sample_type: all_ordered # all indicates whole sequence used to test, while ordered means input sequence by its natural order; Other options:   fixed_unordered
    frames_all_limit: 720 # limit the number of sampled frames to prevent out of memory

    # sample_type: all_ordered # all indicates whole sequence used to test, while ordered means input sequence by its natural order; Other options:   fixed_unordered
    # frames_all_limit: 720 # limit the number of sampled frames to prevent out of memory

  transform:
  - type: ClipRgbTransform
  metric: euc
  cross_view_gallery: false

loss_cfg:
  - loss_term_weight: 1.0
    margin: 0.2
    type: TripletLoss
    log_prefix: triplet
  - loss_term_weight: 1.0
    scale: 16
    type: CrossEntropyLoss
    log_prefix: softmax
    log_accuracy: true

model_cfg:
  model: DeepGaitV2
  Backbone:
    mode: p3d
    in_channels: 3
    layers:
      - 1
      - 1
      - 1
      - 1
    channels:
      - 64
      - 128
      - 256
      - 512
  SeparateBNNecks:
    class_num: 1606

optimizer_cfg:
  lr: 0.01
  momentum: 0.9
  solver: SGD
  weight_decay: 0.0005

scheduler_cfg:
  gamma: 0.1
  milestones: # Learning Rate Reduction at each milestones
    - 20000
    - 30000
    - 40000
  scheduler: MultiStepLR

# scheduler_cfg:
#   T_max: 80000
#   eta_min: 0.0001
#   scheduler: CosineAnnealingLR

trainer_cfg:
  enable_float16: true # half_percesion float for memory reduction and speedup
  fix_BN: false
  with_test: true #true
  log_iter: 100
  restore_ckpt_strict: true
  restore_hint: 0
  save_iter: 50000
  save_name: DeepGaitV2
  sync_BN: true
  total_iter: 50000
  sampler:
    batch_shuffle: true
    batch_size:
      - 8 # TripletSampler, batch_size[0] indicates Number of Identity
      - 4 #                 batch_size[1] indicates Samples sequqnce for each Identity
    frames_num_fixed: 10 # fixed frames number for training
    frames_skip_num: 4
    sample_type: fixed_ordered # fixed control input frames number, unordered for controlling order of input tensor; Other options: unfixed_ordered or all_ordered
    type: TripletSampler
  transform:
  - type: Compose
    trf_cfg:
    - type: SequenceAwareColorJitter
      prob: 0.5
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
    - type: SequenceAwareBoxJitter
      prob: 0.6
      max_shift_ratio: 0.06
      max_scale_ratio: 0.08
      per_frame_jitter_ratio: 0.0
    - type: SequenceAwarePerspectiveAffine
      prob: 0.3
      max_perspective_ratio: 0.05
      max_rotate_degree: 6.0
      max_affine_shift_ratio: 0.04
    - type: SequenceAwareRandomErasing
      prob: 0.35
      sl: 0.03
      sh: 0.1
      r1: 0.3
      per_frame: false
      per_frame_jitter_ratio: 0.02
      value: 0.0
    - type: SequenceAwareHorizontalFlip
      prob: 0.5
    - type: ClipRgbTransform
